<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prova 02 Eletrônica: Reconhecer resistores diversos</title>
</head>
<body>
    
    <script src="reconhecerResistores.js"></script>

    <h3>Descubra a resistência de um resistor a partir de suas faixas</h3>

    <select name="numero de faixas" id="qtdF">
        <option value="5">5</option>
        <option value="4">4</option>
    </select>

    <select name="digito1" id="d1">
        <option value="0">Preto</option>
        <option value="1">Marrom</option>
        <option value="2">Vermelho</option>
        <option value="3">Laranja</option>
        <option value="4">Amarelo</option>
        <option value="5">Verde</option>
        <option value="6">Azul</option>
        <option value="7">Violeta</option>
        <option value="8">Cinza</option>
        <option value="9">Branco</option>
    </select>

    <select name="digito2" id="d2">
        <option value="0">Preto</option>
        <option value="1">Marrom</option>
        <option value="2">Vermelho</option>
        <option value="3">Laranja</option>
        <option value="4">Amarelo</option>
        <option value="5">Verde</option>
        <option value="6">Azul</option>
        <option value="7">Violeta</option>
        <option value="8">Cinza</option>
        <option value="9">Branco</option>
    </select>

    <select name="digito3" id="d3">
        <option value="0">Preto</option>
        <option value="1">Marrom</option>
        <option value="2">Vermelho</option>
        <option value="3">Laranja</option>
        <option value="4">Amarelo</option>
        <option value="5">Verde</option>
        <option value="6">Azul</option>
        <option value="7">Violeta</option>
        <option value="8">Cinza</option>
        <option value="9">Branco</option>
    </select>

    <select name="multiplo" id="m">
        <option value="0">Preto</option>
        <option value="1">Marrom</option>
        <option value="2">Vermelho</option>
        <option value="3">Laranja</option>
        <option value="4">Amarelo</option>
        <option value="5">Verde</option>
        <option value="6">Azul</option>
        <option value="7">Violeta</option>
        <option value="8">Cinza</option>
        <option value="9">Branco</option>
        <option value="-1">Ouro</option>
        <option value="-2">Prata</option>
    </select>

    <select name="tolerancia" id="t">
        <option value="1">Marrom</option>
        <option value="2">Vermelho</option>
        <option value="5">Ouro</option>
        <option value="10">Prata</option>
        <option value="20">Branco</option>
    </select>

    <br>

    <p id="resist">Resistência: 0.00 </p>
    <p id="tolera">Tolerância: 0% = ±0.00 </p>

    <br>

    <a href="../main/index.html">
        <button>Voltar</button>
    </a>
</body>
</html>
